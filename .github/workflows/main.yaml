name: ci
on:
  push
  
# Environment
env:
  CI: true
  PYTHON_VERSION: 3.12

# Allow the job to push the regenerated CV PDF back to main
permissions:
  contents: write

# Jobs to run
jobs:

  # Build and deploy documentation site
  deploy:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:

      # Checkout source form GitHub
      - uses: actions/checkout@v4

      # Install Python runtime and dependencies
      - uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # pip
      - run: |
          pip install -r requirements.txt

      # Chromium for the CV PDF renderer (cv/build.py)
      - run: |
          playwright install --with-deps chromium

      # Render the two CV PDFs from cv/data/cv.yml into docs/assets/doc/
      - name: Build CV PDFs
        run: |
          python cv/build.py

      # Fail loudly if either PDF is missing, so we never deploy a dead download link
      - name: Verify CV PDFs were generated
        run: |
          test -f docs/assets/doc/sandmann-professor-cv.pdf
          test -f docs/assets/doc/sandmann-developer-cv.pdf

      # Commit the regenerated PDFs back to the repo
      - name: Commit CV PDFs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/assets/doc/sandmann-professor-cv.pdf docs/assets/doc/sandmann-developer-cv.pdf
          git diff --staged --quiet || git commit -m "chore: update CV PDFs [skip ci]"
          git push

      # Deploy to GitHub Pages
      - run: |
          mkdocs gh-deploy --force
