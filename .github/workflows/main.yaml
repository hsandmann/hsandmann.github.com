name: ci
on:
  push
  
# Environment
env:
  CI: true
  PYTHON_VERSION: 3.12

# Allow the job to push the regenerated CV PDF back to main
permissions:
  contents: write

# Jobs to run
jobs:

  # Build and deploy documentation site
  deploy:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:

      # Checkout source form GitHub
      - uses: actions/checkout@v4

      # Install Python runtime and dependencies
      - uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # pip
      - run: |
          pip install -r requirements.txt

      # Chromium for the page-to-pdf plugin (renders the CV PDF)
      - run: |
          playwright install --with-deps chromium

      # Build the site (page-to-pdf renders site/index.pdf during the build)
      - run: |
          mkdocs build --strict

      # Fail loudly if the PDF was not produced, so we never deploy a dead download link
      - name: Verify CV PDF was generated
        run: |
          test -f site/index.pdf

      # Commit the regenerated CV PDF back to the repo under a recruiter-friendly name
      - name: Commit CV PDF
        run: |
          cp site/index.pdf docs/assets/doc/humberto-sandmann-cv.pdf
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/assets/doc/humberto-sandmann-cv.pdf
          git diff --staged --quiet || git commit -m "chore: update CV PDF [skip ci]"
          git push

      # Deploy to GitHub Pages
      - run: |
          mkdocs gh-deploy --force
