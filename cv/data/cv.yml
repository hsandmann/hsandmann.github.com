personal:
  name: Humberto Sandmann
  headline: Computer Scientist & Professor
  location: São Paulo, Brazil
  photo: hsandmann.jpg
  # Academic / long summary
  summary: >-
    Computer scientist and professor with a D.Sc. from the University of São Paulo
    and a research stay at the Max Planck Institute for Dynamics and
    Self-Organization. My research bridges bio-inspired neural computing,
    nonlinear dynamics, and pattern recognition, investigating how biological
    neuronal mechanisms can inform computational intelligence. More than a decade
    of university teaching alongside senior industry practice in software
    architecture, artificial intelligence, and high-performance computing.
  # Industry / short summary (developer résumé)
  summary_dev: >-
    Senior software architect and artificial intelligence engineer with 20+ years
    building high-stakes systems across banking, fintech, and retail — core
    banking, cryptography (PKI/HSM), high-performance computing, computer vision,
    and cloud-native microservices. D.Sc. in neural computing; also a university
    professor teaching software design, AI, and distributed systems.

